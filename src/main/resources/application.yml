server:
  port: ${PORT:8085}

spring:
  application:
    name: docflowai-sts-pades-service

# RFC 3161 Timestamp Authority
# DigiCert e gratuit, fara autentificare, accepta SHA-256
tsa:
  url: ${TSA_URL:http://timestamp.digicert.com}

# Chain resolver
trust:
  chain:
    fetch-enabled: ${CHAIN_FETCH_ENABLED:true}
    max-depth: ${CHAIN_MAX_DEPTH:3}
    http-timeout-ms: ${CHAIN_HTTP_TIMEOUT_MS:8000}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    ro.docflowai: ${LOG_LEVEL_APP:INFO}
