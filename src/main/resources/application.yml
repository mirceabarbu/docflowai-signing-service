server:
  port: ${PORT:8085}

spring:
  application:
    name: docflowai-sts-pades-service

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}

trust:
  chain:
    fetch-enabled: ${TRUST_CHAIN_FETCH_ENABLED:true}
    max-depth: ${TRUST_CHAIN_MAX_DEPTH:3}
    http-timeout-ms: ${TRUST_CHAIN_HTTP_TIMEOUT_MS:5000}

TSA_ENABLED: ${TSA_ENABLED:false}
TSA_URL: ${TSA_URL:}
TSA_USERNAME: ${TSA_USERNAME:}
TSA_PASSWORD: ${TSA_PASSWORD:}
TSA_TOKEN_SIZE_ESTIMATE: ${TSA_TOKEN_SIZE_ESTIMATE:8192}
